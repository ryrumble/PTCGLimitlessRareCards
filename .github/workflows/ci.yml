name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy limitless_scraper.py regulation_filter.py --ignore-missing-imports
        continue-on-error: true

      - name: Test with pytest
        run: python -m pytest tests/ test_pyinstaller_compat.py -v --tb=short

  build:
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name LimitlessTCGScraper --add-data "config.json;." run_gui.py
          copy dist\LimitlessTCGScraper.exe .

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimitlessTCGScraper
          path: LimitlessTCGScraper.exe
